name: Earthquake Check

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Run Monitor
        env:
          POWERAUTOMATE_URL: ${{ secrets.POWERAUTOMATE_URL }}
          DATA_PAT:          ${{ secrets.DATA_PAT }}
        run: python monitor.py

      - name: Commit Seen Events
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add seen_events.json
          git diff --cached --quiet || git commit -m "Update seen events"
          git push
