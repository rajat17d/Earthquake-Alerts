name: Earthquake Check
on:
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch:      # Allows you to click "Run workflow" manually
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated from v3 to v4
      
      - name: Setup Python
        uses: actions/setup-python@v5 # Updated from v4 to v5
        with:
          python-version: '3.11'
          
      - name: Install Requirements
        run: pip install requests pandas
        
      - name: Run Monitor
      env:
        POWERAUTOMATE_URL: ${{ secrets.POWERAUTOMATE_URL }}    # Added
        DATA_PAT:          ${{ secrets.DATA_PAT }}             # Added
        run: python monitor.py
